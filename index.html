<!DOCTYPE html>
<html>
<head>
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <h1 class="logo">NETFLIX</h1>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Stranger Things</h1>
            <p>
                When a young boy disappears, his friends uncover a mystery involving secret experiments.
            </p>
            <button class="btn">Play</button>
            <button class="btn btn-secondary">More Info</button>
        </div>
    </header>
    <h2 class="row-title">Trending</h2>
    <div class="row">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg" alt="Avengers Infinity War">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg" alt="Doctor Strange in the Multiverse of Madness">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg" alt="Stranger Things 3">
    </div>
    <h2 class="row-title">Action</h2>
    <!-- Movie posters w300 makes them more clearer -->
    <div class="row">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/tVxDe01Zy3kZqaZRNiXFGDICdZk.jpg" alt="Bullet Train">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/8QVDXDiOGHRcAD4oM6MXjE0osSj.jpg" alt="Alienoid">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg" alt="The Super Mario Bros. Movie">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg" alt="Doctor Strange in the Multiverse of Madness">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/4m1Au3YkjqsxF8iwQy0fPYSxE0h.jpg" alt="Meg 2">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg" alt="The Avengers: Infinity War">
    </div>
    <h2 class="row-title">Comedy</h2>
    <div class="row">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" alt="Wonder Woman 1984">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/4Y1WNkd88JXmGfhtWR7dmDAo1T2.jpg" alt="Elemental">
        <img class="movie" src="https://placehold.co/300x450/E50914/FFFFFF?text=Comedy+Movie+1" alt="Comedy Movie 1">
        <img class="movie" src="https://placehold.co/300x450/E50914/FFFFFF?text=Comedy+Movie+2" alt="Comedy Movie 2">
        <img class="movie" src="https://placehold.co/300x450/E50914/FFFFFF?text=Comedy+Movie+3" alt="Comedy Movie 3">
        <img class="movie" src="https://placehold.co/300x450/E50914/FFFFFF?text=Comedy+Movie+4" alt="Comedy Movie 4">
        <img class="movie" src="https://placehold.co/300x450/E50914/FFFFFF?text=Comedy+Movie+5" alt="Comedy Movie 5">
    </div>
    <h2 class="row-title">Sci-Fi</h2>
    <div class="row">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/8b8R8l88Qje9dn9OE8PY05Nxl1X.jpg" alt="Dune Part 2">
        <img class="movie" src="https://placehold.co/300x450/111/00FFFF?text=Sci-Fi+1" alt="Sci-Fi Movie 1">
        <img class="movie" src="https://placehold.co/300x450/111/00FFFF?text=Sci-Fi+2" alt="Sci-Fi Movie 2">
        <img class="movie" src="https://placehold.co/300x450/111/00FFFF?text=Sci-Fi+3" alt="Sci-Fi Movie 3">
        <img class="movie" src="https://placehold.co/300x450/111/00FFFF?text=Sci-Fi+4" alt="Sci-Fi Movie 4">
        <img class="movie" src="https://placehold.co/300x450/111/00FFFF?text=Sci-Fi+5" alt="Sci-Fi Movie 5">
        <img class="movie" src="https://placehold.co/300x450/111/00FFFF?text=Sci-Fi+6" alt="Sci-Fi Movie 6">
    </div>
    <h2 class="row-title">Popular</h2>
    <div class="row">
        <img class="movie" src="https://placehold.co/300x450/111/1E90FF?text=Popular+1" alt="Popular Movie 1">
        <img class="movie" src="https://placehold.co/300x450/111/1E90FF?text=Popular+2" alt="Popular Movie 2">
        <img class="movie" src="https://placehold.co/300x450/111/1E90FF?text=Popular+3" alt="Popular Movie 3">
        <img class="movie" src="https://placehold.co/300x450/111/1E90FF?text=Popular+4" alt="Popular Movie 4">
        <img class="movie" src="https://placehold.co/300x450/111/1E90FF?text=Popular+5" alt="Popular Movie 5">
    </div>
    <h2 class="row-title">New Releases</h2>
    <div class="row">
        <img class="movie" src="https://placehold.co/300x450/111/32CD32?text=New+1" alt="New Release 1">
        <img class="movie" src="https://placehold.co/300x450/111/32CD32?text=New+2" alt="New Release 2">
        <img class="movie" src="https://placehold.co/300x450/111/32CD32?text=New+3" alt="New Release 3">
        <img class="movie" src="https://placehold.co/300x450/111/32CD32?text=New+4" alt="New Release 4">
        <img class="movie" src="https://placehold.co/300x450/111/32CD32?text=New+5" alt="New Release 5">
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <img id="modalImage" src="" alt="">
            <h2 id="modalTitle"></h2>
            <button class="btn">Play</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
