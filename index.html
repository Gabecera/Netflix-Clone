<!DOCTYPE html>
<html>
<head>
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <h1 class="logo">NETFLIX</h1>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Stranger Things</h1>
            <p>
                When a young boy disappears, his friends uncover a mystery involving secret experiments.
            </p>
            <button class="btn">Play</button>
            <button class="btn btn-secondary">More Info</button>
    </header>
    <h2 class="row-title">Trending</h2>
    <div class="row">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg">
    </div>
    <h2 class="row-title">Action</h2>
    <div class="row">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/tVxDe01Zy3kZqaZRNiXFGDICdZk.jpg" alt="Bullet Train">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/8QVDXDiOGHRcAD4oM6MXjE0osSj.jpg" alt="John Wick">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg" alt="Mad Max Fury Road">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg" alt="The Dark Knight">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg" alt="Extraction">
        <img class="movie" src="https://image.tmdb.org/t/p/w300/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg" alt="Extraction">
    </div>
</body>
</html>
